<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Exam Performance Indicator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.card{max-width:580px;width:100%;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.card-header{background:linear-gradient(135deg,#667eea,#764ba2);padding:2rem;text-align:center;color:#fff}
.card-header .badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:6px 14px;font-size:12px;display:inline-block;margin-bottom:12px;letter-spacing:0.5px}
.card-header h1{font-size:22px;font-weight:700;margin-bottom:6px}
.card-header p{font-size:13px;opacity:0.85}
.card-body{padding:2rem}
.section-label{font-size:11px;font-weight:700;color:#667eea;letter-spacing:1px;text-transform:uppercase;margin:1.5rem 0 1rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#f0f0f0}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
select,input[type=number]{width:100%;padding:10px 14px;font-size:14px;border:2px solid #f0f0f0;border-radius:10px;background:#fafafa;color:#1f2937;height:44px;transition:all 0.2s}
select:focus,input:focus{outline:none;border-color:#667eea;background:#fff;box-shadow:0 0 0 4px rgba(102,126,234,0.1)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.score-input{position:relative}
.score-input input{padding-right:48px}
.score-input .unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:#9ca3af;font-weight:600}
.btn-predict{width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;margin-top:1.5rem;cursor:pointer;letter-spacing:0.3px}
.btn-predict:hover{opacity:0.92}
.result-box{margin-top:1.5rem;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:14px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:16px}
.result-icon{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.result-label{font-size:12px;color:#16a34a;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.result-score{font-size:28px;font-weight:700;color:#15803d}
.chip{display:inline-block;background:#f3f0ff;color:#7c3aed;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;margin-left:6px}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="badge">🎓 ML Prediction App</div>
    <h1>Student Exam Performance</h1>
    <p>Fill in the details below to predict the maths score</p>
  </div>

  <div class="card-body">
    <form action="{{ url_for('predict_datapoint') }}" method="post">
      <div class="section-label">Student profile</div>

      <div class="grid-2">
        <div class="form-group">
          <label>Gender</label>
          <select name="gender" required>
            <option value="" disabled selected>Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
        <div class="form-group">
          <label>Race or ethnicity</label>
          <select name="ethnicity" required>
            <option value="" disabled selected>Select group</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Parental level of education</label>
        <select name="parental_level_of_education" required>
          <option value="" disabled selected>Select education level</option>
          <option value="associate's degree">Associate's degree</option>
          <option value="bachelor's degree">Bachelor's degree</option>
          <option value="high school">High school</option>
          <option value="master's degree">Master's degree</option>
          <option value="some college">Some college</option>
          <option value="some high school">Some high school</option>
        </select>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>Lunch type</label>
          <select name="lunch" required>
            <option value="" disabled selected>Select</option>
            <option value="free/reduced">Free / reduced</option>
            <option value="standard">Standard</option>
          </select>
        </div>
        <div class="form-group">
          <label>Test prep course</label>
          <select name="test_preparation_course" required>
            <option value="" disabled selected>Select</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>

      <div class="section-label">Exam scores <span class="chip">out of 100</span></div>

      <div class="grid-2">
        <div class="form-group">
          <label>Reading score</label>
          <div class="score-input">
            <input type="number" name="reading_score" min="0" max="100" placeholder="e.g. 78" required>
            <span class="unit">/ 100</span>
          </div>
        </div>
        <div class="form-group">
          <label>Writing score</label>
          <div class="score-input">
            <input type="number" name="writing_score" min="0" max="100" placeholder="e.g. 82" required>
            <span class="unit">/ 100</span>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-predict">🎯 &nbsp; Predict maths score</button>
    </form>

    {% if results %}
    <div class="result-box">
      <div class="result-icon">🏆</div>
      <div>
        <div class="result-label">Predicted maths score</div>
        <div class="result-score">{{ "%.1f"|format(results) }} <span style="font-size:16px;font-weight:500;color:#4ade80">/ 100</span></div>
      </div>
    </div>
    {% endif %}
  </div>
</div>
</body>
</html>
